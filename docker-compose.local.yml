services:
  proxy:
    image: itzg/mc-proxy:latest
    ports:
      - "25565:25565"
      - "25568:25568"
      - "24454:24454/udp"
    environment:
      TYPE: VELOCITY
      MINECRAFT_VERSION: 1.21.10
    volumes:
      - ./velocity_data:/server/
    networks:
      - katcraft_net
    restart: unless-stopped
    container_name: velocity

  katcraftpanel:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: katcraftpanel
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DEFAULT_RCON_PASSWORD=minecraft
    env_file:
      - .env
    volumes:
      - ./servers:/app/servers
      - ./velocity_data:/app/velocity_data
      - ./secrets:/app/secrets:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - katcraft_net
    restart: unless-stopped
    depends_on:
      - proxy

networks:
  katcraft_net:
    driver: bridge
