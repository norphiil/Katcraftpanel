<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KatCraftPanel - Minecraft Server Management Dashboard">
  <title>KatCraftPanel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
      <div class="login-card">
        <div class="login-logo">
          <div class="logo-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <rect x="4" y="4" width="40" height="40" rx="8" fill="url(#logoGrad)" opacity="0.15"/>
              <rect x="4" y="4" width="40" height="40" rx="8" stroke="url(#logoGrad)" stroke-width="2"/>
              <path d="M16 24L22 30L32 18" stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
              <defs>
                <linearGradient id="logoGrad" x1="4" y1="4" x2="44" y2="44">
                  <stop stop-color="#00ff88"/>
                  <stop offset="1" stop-color="#00e5ff"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1>KatCraftPanel</h1>
          <p class="login-subtitle">Minecraft Server Management</p>
        </div>
        <form id="login-form" autocomplete="off">
          <div class="form-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" name="username" required autocomplete="username" placeholder="Enter username">
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="Enter password">
          </div>
          <div id="login-error" class="form-error" style="display:none"></div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn">
            <span>Sign In</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </form>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="main-app" style="display:none">
      <!-- Sidebar -->
      <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <div class="logo-dot"></div>
            <span>KatCraftPanel</span>
          </div>
        </div>
        <ul class="sidebar-nav">
          <li>
            <a href="#" data-page="dashboard" class="nav-link active" id="nav-dashboard">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a href="#" data-page="servers" class="nav-link" id="nav-servers">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg>
              <span>Servers</span>
            </a>
          </li>
          <li>
            <a href="#" data-page="create" class="nav-link" id="nav-create">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
              <span>New Server</span>
            </a>
          </li>
        </ul>
        <div class="sidebar-divider"></div>
        <div id="server-quick-list" class="server-quick-list">
          <div class="quick-list-title">Active Servers</div>
          <!-- Populated dynamically -->
        </div>
        <div class="sidebar-footer">
          <button id="logout-btn" class="btn-logout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            <span>Logout</span>
          </button>
        </div>
      </nav>

      <!-- Content Area -->
      <main id="content" class="content">
        <div id="page-content" class="page-content">
          <!-- Pages rendered here dynamically -->
        </div>
      </main>
    </div>
  </div>

  <!-- Modal Container -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div id="modal-content" class="modal-content">
      <!-- Modals rendered here -->
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="/js/utils/helpers.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/utils/websocket.js"></script>
  <script src="/js/components/login.js"></script>
  <script src="/js/components/sidebar.js"></script>
  <script src="/js/components/dashboard.js"></script>
  <script src="/js/components/server-list.js"></script>
  <script src="/js/components/server-create.js"></script>
  <script src="/js/components/server-detail.js"></script>
  <script src="/js/components/file-manager.js"></script>
  <script src="/js/components/text-editor.js"></script>
  <script src="/js/components/terminal.js"></script>
  <script src="/js/components/backup-config.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
